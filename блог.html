<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Мои мысли | мини-блог Дамира</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: radial-gradient(circle at 20% 30%, #0f172a, #030712);
            font-family: 'Segoe UI', system-ui, 'Inter', monospace;
            padding: 1.5rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .blog-container {
            max-width: 600px;
            width: 100%;
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(14px);
            border-radius: 2.5rem;
            padding: 1.6rem;
            border: 1px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 25px 40px -10px black;
        }
        h1 {
            font-size: 1.9rem;
            text-align: center;
            background: linear-gradient(120deg, #ffe6b0, #d4af37);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .sub {
            text-align: center;
            color: #aabbdd;
            margin-bottom: 1.8rem;
            font-size: 0.85rem;
        }
        .add-post {
            background: #0a1022cc;
            border-radius: 1.5rem;
            padding: 1rem;
            margin-bottom: 1.8rem;
        }
        textarea {
            width: 100%;
            background: #010a1a;
            border: 1px solid #3a5680;
            border-radius: 1.5rem;
            padding: 12px;
            font-size: 1rem;
            color: white;
            font-family: inherit;
            resize: vertical;
        }
        button {
            background: #d4af37;
            border: none;
            padding: 10px 20px;
            border-radius: 2rem;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
            width: 100%;
        }
        .posts-list {
            list-style: none;
            margin-top: 20px;
        }
        .post-item {
            background: #0c1430cc;
            border-radius: 1.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 5px solid #ffcd7e;
            word-break: break-word;
        }
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }
        .post-date {
            font-size: 0.7rem;
            color: #99aacc;
        }
        .post-content {
            font-size: 1rem;
            line-height: 1.4;
            color: #eef2ff;
        }
        .delete-post {
            background: #7a2e2e;
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .reset-btn {
            background: #2e3b4e;
            margin-top: 10px;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 20px;
            color: #6f87aa;
        }
    </style>
</head>
<body>
<div class="blog-container">
    <h1>📖 МОИ МЫСЛИ</h1>
    <div class="sub">идеи, планы, цели — всё в одном месте</div>

    <div class="add-post">
        <textarea id="postContent" rows="2" placeholder="Напиши свою мысль... например: «через год я в Москве», «купить ноутбук за 80к», «сделать крутой сайт»"></textarea>
        <button id="addPostBtn">✍️ Опубликовать мысль</button>
    </div>

    <ul class="posts-list" id="postsList"></ul>

    <button id="resetAllPostsBtn" class="reset-btn">🗑️ Очистить все записи</button>
    <footer>все записи сохраняются в телефоне</footer>
</div>

<script>
    let posts = [];

    function loadPosts() {
        const saved = localStorage.getItem("damir_blog");
        if (saved) {
            posts = JSON.parse(saved);
        } else {
            posts = [];
        }
        renderPosts();
    }

    function savePosts() {
        localStorage.setItem("damir_blog", JSON.stringify(posts));
    }

    function renderPosts() {
        const container = document.getElementById("postsList");
        if (posts.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:20px; color:#aaa;">✨ Здесь будут твои мысли. Напиши первую! ✨</div>`;
            return;
        }
        let html = "";
        for (let i = 0; i < posts.length; i++) {
            const post = posts[i];
            html += `
                <li class="post-item">
                    <div class="post-header">
                        <span class="post-date">📅 ${escapeHtml(post.date)}</span>
                        <button class="delete-post" data-index="${i}">🗑️ Удалить</button>
                    </div>
                    <div class="post-content">${escapeHtml(post.text)}</div>
                </li>
            `;
        }
        container.innerHTML = html;

        // обработчики удаления
        document.querySelectorAll('.delete-post').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.getAttribute('data-index'));
                posts.splice(idx, 1);
                savePosts();
                renderPosts();
            });
        });
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.getElementById("addPostBtn").addEventListener("click", () => {
        const textarea = document.getElementById("postContent");
        const text = textarea.value.trim();
        if (text === "") {
            alert("Напиши что-нибудь, прежде чем публиковать");
            return;
        }
        const now = new Date();
        const dateStr = `${now.getDate()}.${now.getMonth()+1}.${now.getFullYear()} ${now.getHours()}:${now.getMinutes()}`;
        posts.unshift({   // свежие записи вверху
            text: text,
            date: dateStr
        });
        savePosts();
        renderPosts();
        textarea.value = "";
    });

    document.getElementById("resetAllPostsBtn").addEventListener("click", () => {
        if (confirm("Удалить ВСЕ записи? Они исчезнут навсегда")) {
            posts = [];
            savePosts();
            renderPosts();
        }
    });

    loadPosts();
</script>
</body>
</html>
