<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Skymipe | Магазин + Профиль</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            padding: 1rem;
            min-height: 100vh;
        }
        .glass {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(10, 20, 40, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid rgba(70, 130, 200, 0.4);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c0e0ff, #4a7cbb);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .nav-buttons {
            display: flex;
            gap: 0.8rem;
        }
        .nav-btn {
            background: #1e3a5f;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-btn.active {
            background: #ffaa33;
            color: #1e2a3a;
        }
        .tab {
            display: none;
        }
        .tab.active-tab {
            display: block;
        }
        .search-box {
            width: 100%;
            padding: 12px 20px;
            border-radius: 60px;
            border: 1px solid #2a4a7a;
            background: #0a1222;
            color: white;
            margin-bottom: 1.5rem;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 1.5rem;
        }
        .product-card {
            background: #0a1020;
            border-radius: 1.5rem;
            padding: 1rem;
            border: 1px solid #2a4a7a;
            transition: transform 0.2s;
        }
        .product-card:hover {
            transform: translateY(-4px);
            border-color: #ffaa33;
        }
        .product-card img {
            width: 100%;
            border-radius: 1rem;
            height: 170px;
            object-fit: cover;
        }
        .product-title {
            font-weight: 600;
            color: #c0e0ff;
            margin: 10px 0 4px;
        }
        .price {
            font-weight: 700;
            font-size: 1.2rem;
            color: #ffaa33;
            margin: 8px 0;
        }
        .add-to-cart {
            background: #1e3a5f;
            border: none;
            padding: 8px 0;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #0a1020;
            border-radius: 2rem;
            padding: 1.5rem;
            width: 90%;
            max-width: 500px;
            border: 1px solid #4a7cbb;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a4a7a;
            padding: 10px 0;
            color: white;
        }
        .profile-card {
            background: #0a1020;
            border-radius: 1.5rem;
            padding: 1.5rem;
        }
        .profile-card input {
            width: 100%;
            padding: 10px;
            border-radius: 40px;
            border: 1px solid #2a4a7a;
            background: #0a1222;
            color: white;
            margin: 8px 0;
        }
        .history-item {
            background: #0f172a;
            border-radius: 1rem;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            color: #5b6e8c;
        }
    </style>
</head>
<body>
<div class="glass">
    <div class="header">
        <div class="logo">🛸 SKYMIPE MARKET</div>
        <div class="nav-buttons">
            <button class="nav-btn active" data-tab="shop">🛒 Магазин</button>
            <button class="nav-btn" data-tab="profile">👤 Профиль</button>
        </div>
    </div>

    <!-- вкладка МАГАЗИН -->
    <div id="shopTab" class="tab active-tab">
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 Поиск товаров...">
        <div id="productsContainer" class="products-grid"></div>
    </div>

    <!-- вкладка ПРОФИЛЬ -->
    <div id="profileTab" class="tab">
        <div class="profile-card">
            <h3 style="color:#c0e0ff;">👤 Мои данные</h3>
            <input type="text" id="userName" placeholder="Имя">
            <input type="text" id="userPhone" placeholder="Телефон">
            <button id="saveProfileBtn" style="background:#1e3a5f;">💾 Сохранить профиль</button>
            <h3 style="color:#c0e0ff; margin-top:1.5rem;">📦 История заказов</h3>
            <div id="ordersHistory"></div>
        </div>
    </div>
</div>

<!-- модалка корзины -->
<div id="cartModal" class="modal">
    <div class="modal-content">
        <h2 style="color:#c0e0ff;">🛒 Корзина</h2>
        <div id="cartItemsList"></div>
        <p style="margin-top:1rem;"><strong>Итого: <span id="cartTotal">0</span> ₽</strong></p>
        <button id="checkoutBtn" style="background:#ffaa33; color:#1e2a3a;">✅ Оформить заказ</button>
        <button id="closeCartBtn" style="background:#1e3a5f; margin-top:0.5rem;">Закрыть</button>
    </div>
</div>

<script>// ========== ТОВАРЫ ==========
let products = JSON.parse(localStorage.getItem("skymipe_products"));
if (!products || products.length === 0) {
    const categories = ["Ноутбук", "Смартфон", "Наушники", "Мышь", "Клавиатура", "Монитор", "Видеокарта", "SSD", "Колонки", "Планшет"];
    const pics = ["https://clck.ru/3U5j2w","https://clck.ru/3U5j3t","https://clck.ru/3U5j4w","https://clck.ru/3U5j5q","https://clck.ru/3U5j6p","https://clck.ru/3U5j7t"];
    products = [];
    for (let i = 1; i <= 620; i++) {
        const cat = categories[i % categories.length];
        const price = Math.floor(Math.random() * 95000) + 1500;
        products.push({ id: i, name: `${cat} ${i}`, price: price, desc: `🔥 Оригинальный ${cat}`, img: pics[i % pics.length] });
    }
    localStorage.setItem("skymipe_products", JSON.stringify(products));
}

// ========== КОРЗИНА ==========
let cart = JSON.parse(localStorage.getItem("skymipe_cart")) || [];
function saveCart() { localStorage.setItem("skymipe_cart", JSON.stringify(cart)); updateCartUI(); }
function updateCartUI() { document.getElementById("cartCount").innerText = cart.reduce((s,i)=>s+i.quantity,0); }
function addToCart(pid, qty=1) {
    const p = products.find(pr=>pr.id===pid);
    const ex = cart.find(i=>i.id===pid);
    if(ex) ex.quantity += qty;
    else cart.push({...p, quantity: qty});
    saveCart();
    alert(`${p.name} в корзине`);
}
function changeQty(pid, delta) {
    const item = cart.find(i=>i.id===pid);
    if(item) {
        item.quantity += delta;
        if(item.quantity<=0) cart = cart.filter(i=>i.id!==pid);
        saveCart();
        renderCartModal();
    }
}
function checkout() {
    if(!cart.length) return alert("Корзина пуста");
    const total = cart.reduce((s,i)=>s+i.price*i.quantity,0);
    const orders = JSON.parse(localStorage.getItem("skymipe_orders")) || [];
    orders.unshift({ date: new Date().toLocaleString(), items: cart.map(i=>({name:i.name, price:i.price, quantity:i.quantity})), total });
    localStorage.setItem("skymipe_orders", JSON.stringify(orders));
    alert(`✅ Заказ на ${total.toLocaleString()} ₽ оформлен`);
    cart = [];
    saveCart();
    renderProducts(document.getElementById("searchInput")?.value || "");
    renderCartModal();
    renderOrdersHistory();
}
function renderCartModal() {
    const container = document.getElementById("cartItemsList");
    if(!container) return;
    if(!cart.length) { container.innerHTML="<p>Корзина пуста</p>"; document.getElementById("cartTotal").innerText="0"; return; }
    let total=0, html="";
    cart.forEach(i=>{ total+=i.price*i.quantity; html+=`<div class="cart-item"><span>${i.name} x${i.quantity}</span><span>${(i.price*i.quantity).toLocaleString()} ₽</span><button onclick="changeQty(${i.id}, -1)">-</button><button onclick="changeQty(${i.id}, 1)">+</button></div>`; });
    container.innerHTML=html;
    document.getElementById("cartTotal").innerText=total.toLocaleString();
}
window.changeQty = changeQty;

// ========== ПРОФИЛЬ ==========
function renderOrdersHistory() {
    const container = document.getElementById("ordersHistory");
    if(!container) return;
    const orders = JSON.parse(localStorage.getItem("skymipe_orders")) || [];
    if(orders.length===0) { container.innerHTML="<p>Заказов пока нет</p>"; return; }
    container.innerHTML = orders.map(o => `<div class="history-item"><strong>📅 ${o.date}</strong><br>${o.items.map(i=>`${i.name} x${i.quantity} = ${(i.price*i.quantity).toLocaleString()} ₽`).join("<br>")}<br><strong>💰 Итого: ${o.total.toLocaleString()} ₽</strong></div>`).join("");
}
function saveProfile() {
    const name = document.getElementById("userName").value;
    const phone = document.getElementById("userPhone").value;
    localStorage.setItem("skymipe_user", JSON.stringify({ name, phone }));
    alert("Профиль сохранён!");
}
function loadProfile() {
    const saved = JSON.parse(localStorage.getItem("skymipe_user"));
    if(saved) {
        document.getElementById("userName").value = saved.name || "";
        document.getElementById("userPhone").value = saved.phone || "";
    }
}    // ========== ОТРИСОВКА ТОВАРОВ ==========
    function renderProducts(filter = "") {
        const container = document.getElementById("productsContainer");
        if (!container) return;
        const filtered = products.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
        if (filtered.length === 0) {
            container.innerHTML = "<div style='text-align:center; padding:2rem; color:#5b6e8c;'>😕 Ничего не найдено</div>";
            return;
        }
        container.innerHTML = filtered.map(p => `
            <div class="product-card">
                <img src="${p.img}" onerror="this.src='https://via.placeholder.com/270x170?text=Skymipe'">
                <div class="product-title">${p.name}</div>
                <div class="price">${p.price.toLocaleString()} ₽</div>
                <p style="font-size:0.8rem; color:#8aa9cc; margin-bottom:0.8rem;">${p.desc.substring(0,70)}</p>
                <button class="add-to-cart" data-id="${p.id}">🛒 В корзину</button>
            </div>
        `).join("");
        document.querySelectorAll(".add-to-cart").forEach(btn => {
            btn.addEventListener("click", () => addToCart(parseInt(btn.dataset.id), 1));
        });
    }

    // ========== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ==========
    function switchTab(tabId) {
        document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("active-tab"));
        document.getElementById(`${tabId}Tab`).classList.add("active-tab");
        document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.remove("active"));
        document.querySelector(`.nav-btn[data-tab="${tabId}"]`).classList.add("active");
        if (tabId === "profile") {
            renderOrdersHistory();
            loadProfile();
        }
    }

    // ========== КНОПКИ ==========
    document.getElementById("cartBtn")?.addEventListener("click", () => {
        renderCartModal();
        document.getElementById("cartModal").style.display = "flex";
    });
    document.getElementById("closeCartBtn")?.addEventListener("click", () => {
        document.getElementById("cartModal").style.display = "none";
    });
    document.getElementById("checkoutBtn")?.addEventListener("click", () => {
        checkout();
        document.getElementById("cartModal").style.display = "none";
    });
    document.getElementById("saveProfileBtn")?.addEventListener("click", saveProfile);
    document.getElementById("searchInput")?.addEventListener("input", (e) => renderProducts(e.target.value));

    document.querySelectorAll(".nav-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
            const tab = btn.getAttribute("data-tab");
            switchTab(tab);
        });
    });

    // добавляем кнопку корзины в навигацию
    const navDiv = document.querySelector(".nav-buttons");
    if (navDiv && !document.getElementById("cartBtn")) {
        const cartNavBtn = document.createElement("button");
        cartNavBtn.id = "cartBtn";
        cartNavBtn.className = "nav-btn";
        cartNavBtn.style.background = "#ffaa33";
        cartNavBtn.style.color = "#1e2a3a";
        cartNavBtn.innerHTML = "🛒 Корзина (<span id='cartCount'>0</span>)";
        cartNavBtn.onclick = () => {
            renderCartModal();
            document.getElementById("cartModal").style.display = "flex";
        };
        navDiv.appendChild(cartNavBtn);
    }

    // ========== ЗАПУСК ==========
    renderProducts("");
    updateCartUI();
    switchTab("shop");
</script>
</body>
</html>
