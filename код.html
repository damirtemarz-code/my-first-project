<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Твой личный бюджет — Дамир</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: radial-gradient(circle at 20% 30%, #0f172a, #030712);
            font-family: 'Segoe UI', system-ui, 'Inter', monospace;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            max-width: 550px;
            width: 100%;
            background: rgba(15, 25, 45, 0.65);
            backdrop-filter: blur(14px);
            border-radius: 3rem;
            padding: 1.8rem;
            box-shadow: 0 25px 40px -10px rgba(0,0,0,0.5), 0 0 0 1px rgba(212, 175, 55, 0.2) inset;
            border: 1px solid rgba(212, 175, 55, 0.5);
        }
        h1 {
            font-size: 1.9rem;
            text-align: center;
            background: linear-gradient(120deg, #ffe6b0, #d4af37);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .income-block, .expenses-block {
            background: #0a1022cc;
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin-bottom: 1.6rem;
            border: 1px solid #2e3d66;
        }
        .label {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 1.2rem;
            color: #ffdfaa;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 3px solid #d4af37;
            padding-left: 12px;
        }
        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            align-items: center;
        }
        .input-group input {
            flex: 2;
            background: #010a1a;
            border: 1px solid #3a5680;
            padding: 12px 16px;
            border-radius: 2rem;
            font-size: 1rem;
            color: #ffffff;
            font-weight: 500;
            outline: none;
        }
        .input-group input:focus {
            border-color: #ffcd7e;
            box-shadow: 0 0 5px #ffcd7e;
        }
        .input-group button {
            background: #d4af37;
            border: none;
            padding: 8px 20px;
            border-radius: 2rem;
            font-weight: bold;
            color: #0a0f1f;
            cursor: pointer;
            transition: 0.1s linear;
        }
        .input-group button:active { transform: scale(0.97); }
        .expense-item {
            background: #030b1c;
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .expense-name { font-weight: 600; color: #ffd98c; }
        .expense-amount { font-family: monospace; font-size: 1.1rem; font-weight: bold; color: #ffaa66; }
        .delete-expense {
            background: #7a2e2e;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
        }
        .total {
            background: #00000077;
            padding: 1rem;
            border-radius: 2rem;
            margin: 1.5rem 0;
            text-align: center;
            border: 1px solid #ffcd7e;
        }
        .total p {
            font-size: 1.3rem;
            font-weight: bold;
        }
        .remain {
            font-size: 1.7rem;
            font-weight: 800;
            color: #ffdd88;
        }
        .reset-btn {
            background: #2e3b4e;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 3rem;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            cursor: pointer;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 20px;
            color: #6f87aa;
        }
        @media (max-width: 500px) {
            .card { padding: 1rem; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🧮 ПОСЧИТАЕМ, ДАМИР</h1>

    <!-- БЛОК ДОХОДОВ -->
    <div class="income-block">
        <div class="label">💰 ДОХОД (ЗП / КАРМАННЫЕ)</div>
        <div class="input-group">
            <input type="number" id="incomeInput" placeholder="Сумма, например 50000" value="0">
            <button id="setIncomeBtn">✅ Установить доход</button>
        </div>
        <div>💵 Твой доход: <strong id="incomeDisplay">0</strong> ₽</div>
    </div>

    <!-- БЛОК РАСХОДОВ -->
    <div class="expenses-block">
        <div class="label">📉 РАСХОДЫ (добавляй)</div>
        <div class="input-group">
            <input type="text" id="expenseName" placeholder="Например: Аренда, Еда, Такси">
            <input type="number" id="expenseAmount" placeholder="Сумма">
            <button id="addExpenseBtn">➕ Добавить</button>
        </div>
        <div id="expensesList"></div>
    </div>

    <!-- ИТОГО -->
    <div class="total">
        <p>📊 СУММА РАСХОДОВ: <span id="totalExpenses">0</span> ₽</p>
        <p>💎 ОСТАЁТСЯ (можно копить): <br> <span id="remainAmount" class="remain">0</span> ₽</p>
    </div>

    <button id="resetAllBtn" class="reset-btn">🔄 СБРОСИТЬ ВСЕ ДАННЫЕ</button>
    <footer>данные сохранятся в телефоне — даже после перезагрузки страницы</footer>
</div>

<script>
    // --- ЗАГРУЗКА ИЗ ПАМЯТИ ---
    let income = parseFloat(localStorage.getItem('damir_income')) || 0;
    let expenses = JSON.parse(localStorage.getItem('damir_expenses')) || [];

    // --- DOM элементы ---
    const incomeInput = document.getElementById('incomeInput');
    const setIncomeBtn = document.getElementById('setIncomeBtn');
    const incomeDisplay = document.getElementById('incomeDisplay');
    const expenseNameInput = document.getElementById('expenseName');
    const expenseAmountInput = document.getElementById('expenseAmount');
    const addExpenseBtn = document.getElementById('addExpenseBtn');
    const expensesListDiv = document.getElementById('expensesList');
    const totalExpensesSpan = document.getElementById('totalExpenses');
    const remainSpan = document.getElementById('remainAmount');
    const resetBtn = document.getElementById('resetAllBtn');

    // --- вспомогательные функции ---
    function saveToLocal() {
        localStorage.setItem('damir_income', income);
        localStorage.setItem('damir_expenses', JSON.stringify(expenses));
    }

    function updateUI() {
        // отображаем доход
        incomeDisplay.innerText = income;
        incomeInput.value = income;

        // считаем сумму расходов
        let total = 0;
        for (let i = 0; i < expenses.length; i++) {
            total += expenses[i].amount;
        }
        totalExpensesSpan.innerText = total;
        let remain = income - total;
        remainSpan.innerText = remain >= 0 ? remain : 0;

        // рисуем список расходов
        if (expenses.length === 0) {
            expensesListDiv.innerHTML = '<div style="color:#888; text-align:center; padding:10px;">⚡ Добавь первый расход</div>';
        } else {
            let html = '';
            for (let i = 0; i < expenses.length; i++) {
                html += `
                    <div class="expense-item">
                        <span class="expense-name">📌 ${expenses[i].name}</span>
                        <span class="expense-amount">${expenses[i].amount} ₽</span>
                        <button class="delete-expense" data-index="${i}">✖️ Удалить</button>
                    </div>
                `;
            }
            expensesListDiv.innerHTML = html;
            // навешиваем обработчики на кнопки удаления
            const delBtns = document.querySelectorAll('.delete-expense');
            for (let btn of delBtns) {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.getAttribute('data-index'));
                    expenses.splice(idx, 1);
                    saveToLocal();
                    updateUI();
                });
            }
        }
    }

    // --- установка дохода ---
    setIncomeBtn.addEventListener('click', () => {
        let val = parseFloat(incomeInput.value);
        if (isNaN(val)) val = 0;
        income = val;
        saveToLocal();
        updateUI();
    });

    // --- добавление расхода ---
    addExpenseBtn.addEventListener('click', () => {
        let name = expenseNameInput.value.trim();
        let amount = parseFloat(expenseAmountInput.value);
        if (name === '') {
            alert('Напиши название расхода (например, Такси)');
            return;
        }
        if (isNaN(amount) || amount <= 0) {
            alert('Введи корректную сумму расхода');
            return;
        }
        expenses.push({ name: name, amount: amount });
        saveToLocal();
        updateUI();
        expenseNameInput.value = '';
        expenseAmountInput.value = '';
    });

    // --- сброс всего ---
    resetBtn.addEventListener('click', () => {
        if (confirm('Сбросить доход и все расходы?')) {
            income = 0;
            expenses = [];
            saveToLocal();
            updateUI();
        }
    });

    // --- инициализация ---
    updateUI();
</script>
</body>
</html>
